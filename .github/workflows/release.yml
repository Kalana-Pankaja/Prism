name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 0.2.0). Used for artifact names."
        required: false
        default: ""
      platform:
        description: "Which platform(s) to build (use linux, windows, or arch to test one side first)"
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - arch

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_VERSION: "6.10.3"
  QT_MODULES: >-
    qtmultimedia
    qtwebengine
    qtwebsockets
    qtwebchannel
    qtpositioning
    qtserialport
  QT_QPA_PLATFORM: offscreen
  FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps
  # Pinned to match the FFmpeg version QtMultimedia's ffmpeg backend bundles for
  # QT_VERSION above (check doc.qt.io/qt-6/qtmultimedia-attribution-ffmpeg.html
  # when bumping QT_VERSION) — linking a mismatched FFmpeg build alongside Qt's
  # own private copy crashes at runtime (two FFmpeg ABIs loaded in one process).
  FFMPEG_BUILD_TAG: "autobuild-2026-07-09-14-21"
  FFMPEG_BUILD_VERSION: "n7.1.5-1-g7d0e842004"

jobs:
  meta:
    name: Compute metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Compute version
        id: meta
        shell: bash
        run: |
          raw="${{ inputs.version }}"
          if [[ -z "${raw}" ]]; then
            raw="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=${raw#v}" >> "$GITHUB_OUTPUT"

  linux:
    name: Linux AppImage
    runs-on: ubuntu-26.04
    needs: meta
    if: inputs.platform == 'all' || inputs.platform == 'linux'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libgl1-mesa-dev libglib2.0-dev libdbus-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libre2-dev libzip-dev libssl-dev liblua5.4-dev \
            libfontconfig1-dev libfreetype6-dev libxkbcommon-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libxcb1-dev libxcb-glx0-dev libxcb-keysyms1-dev libxcb-image0-dev libxcb-shm0-dev \
            libxcb-icccm4-dev libxcb-sync-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-xinerama0-dev libxcb-cursor-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: ${{ env.QT_MODULES }}
          cache: true
          add-tools-to-path: true

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-linux-${{ hashFiles('CMakeLists.txt') }}

      - name: Fetch pinned FFmpeg
        shell: bash
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.deps/ffmpeg"
          curl -sL "https://github.com/BtbN/FFmpeg-Builds/releases/download/${FFMPEG_BUILD_TAG}/ffmpeg-${FFMPEG_BUILD_VERSION}-linux64-lgpl-shared-7.1.tar.xz" \
            | tar -xJf - --strip-components=1 -C "${GITHUB_WORKSPACE}/.deps/ffmpeg"

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="${GITHUB_WORKSPACE}/.deps/ffmpeg/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR};${GITHUB_WORKSPACE}/.deps/ffmpeg" \
            -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}" \
            -DPRISM_WITH_NDI=OFF \
            -DPRISM_WITH_WEBRTC=ON \
            -DPRISM_WITH_SEGMENTATION=ON

      - name: Build
        run: |
          # libdatachannel and its vendored libjuice each define two static-lib
          # targets (a plain one and a "-static"-suffixed EXCLUDE_FROM_ALL one);
          # Prism only links the "-static" variants, so the plain `datachannel`
          # and `juice` targets are never built as a side effect of building
          # Prism — yet both are still unconditionally install()'d, so `cmake
          # --install` fails looking for .a files that were never produced
          # unless built explicitly here.
          cmake --build build --target Prism --target juice --target datachannel --parallel

      - name: Stage install tree
        run: |
          cmake --install build --prefix "${GITHUB_WORKSPACE}/AppDir/usr"
          mkdir -p "${GITHUB_WORKSPACE}/dist"

      - name: Build AppImage
        shell: bash
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -O linuxdeploy-plugin-qt.AppImage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-qt.AppImage
          export QMAKE="${QT_ROOT_DIR}/bin/qmake"
          export VERSION="${{ needs.meta.outputs.version }}"
          # ONNX Runtime is auto-downloaded by CMakeModules/FetchOnnxRuntime.cmake
          # into a version-suffixed dir under build/_deps; only its Windows path
          # gets a post-build copy-next-to-exe step (CMakeLists.txt's `if(WIN32)`
          # block), so on Linux linuxdeploy needs it on LD_LIBRARY_PATH to find
          # and bundle libonnxruntime.so.1 via its ldd-based dependency scan.
          onnxruntime_lib_dir="$(find "${GITHUB_WORKSPACE}/build/_deps/onnxruntime" -maxdepth 2 -type d -name lib | head -n1)"
          export LD_LIBRARY_PATH="${QT_ROOT_DIR}/lib:${GITHUB_WORKSPACE}/.deps/ffmpeg/lib:${onnxruntime_lib_dir}:${LD_LIBRARY_PATH:-}"
          ./linuxdeploy.AppImage --appdir AppDir --plugin qt --output appimage \
            -d flatpak/org.cutwire.Prism.desktop \
            -i flatpak/share/icons/hicolor/256x256/apps/org.cutwire.Prism.png \
            -e AppDir/usr/bin/Prism
          appimage="$(ls ./*.AppImage | grep -iv linuxdeploy | head -n 1)"
          mv "${appimage}" "dist/Prism-${{ needs.meta.outputs.version }}-x86_64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  windows:
    name: Windows installer
    runs-on: windows-2022
    needs: meta
    if: inputs.platform == 'all' || inputs.platform == 'windows'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: ${{ env.QT_MODULES }}
          cache: true
          add-tools-to-path: true

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}\vcpkg_bincache
          key: vcpkg-bincache-win-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            vcpkg-bincache-win-

      - name: Install vcpkg dependencies
        shell: pwsh
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg_bincache
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          if (-not (Test-Path vcpkg\vcpkg.exe)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
            .\vcpkg\bootstrap-vcpkg.bat
          }
          .\vcpkg\vcpkg.exe install re2 libzip openssl --triplet x64-windows

      # Save even when a later step fails so the vcpkg build is not repeated on
      # the next run (actions/cache only saves on job success).
      - name: Save vcpkg binary cache
        if: always() && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}\vcpkg_bincache
          key: vcpkg-bincache-win-${{ hashFiles('CMakeLists.txt') }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-win-${{ hashFiles('CMakeLists.txt') }}

      # Pinned to match the FFmpeg version QtMultimedia's ffmpeg backend bundles
      # (see the FFMPEG_BUILD_TAG comment at the top of this file) instead of
      # vcpkg's floating ffmpeg port, which does not track Qt's bundled version
      # and previously caused two mismatched FFmpeg ABIs to be loaded at once.
      - name: Fetch pinned FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .deps\ffmpeg | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/$env:FFMPEG_BUILD_TAG/ffmpeg-$env:FFMPEG_BUILD_VERSION-win64-lgpl-shared-7.1.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath .deps\ffmpeg_extracted
          $extractedRoot = (Get-ChildItem .deps\ffmpeg_extracted)[0].FullName
          Move-Item "$extractedRoot\*" .deps\ffmpeg

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }};${{ github.workspace }}\.deps\ffmpeg" `
            -DFETCHCONTENT_BASE_DIR=${{ env.FETCHCONTENT_BASE_DIR }} `
            -DPRISM_WITH_NDI=OFF `
            -DPRISM_WITH_WEBRTC=ON `
            -DPRISM_WITH_SEGMENTATION=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --target Prism --parallel

      - name: Stage runtime files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\bin | Out-Null
          Copy-Item build\Release\Prism.exe dist\bin -Force
          Copy-Item build\Release\softcam.dll dist\bin -Force -ErrorAction SilentlyContinue
          Copy-Item build\Release\onnxruntime*.dll dist\bin -Force -ErrorAction SilentlyContinue
          & "${{ env.QT_ROOT_DIR }}\bin\windeployqt.exe" --release --no-translations dist\bin\Prism.exe
          Copy-Item vcpkg\installed\x64-windows\bin\*.dll dist\bin -Force
          Copy-Item .deps\ffmpeg\bin\*.dll dist\bin -Force

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.6
        with:
          path: installer/windows/Prism.iss
          options: |
            /DMyAppVersion=${{ needs.meta.outputs.version }}
            /DMyAppSource=${{ github.workspace }}\dist\bin

      - name: Collect installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item installer\windows\output\Prism-Setup-x64.exe `
            "dist\Prism-Setup-${{ needs.meta.outputs.version }}-x64.exe" -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  arch:
    name: Arch package
    runs-on: ubuntu-24.04
    if: inputs.platform == 'all' || inputs.platform == 'arch'
    timeout-minutes: 60
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      # makepkg refuses to run as root, and archlinux:base-devel's default
      # user is root — create an unprivileged builder with passwordless sudo
      # (needed for makepkg -s to pacman-install PKGBUILD's own depends).
      - name: Set up builder user
        run: |
          pacman -Syu --noconfirm
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "${GITHUB_WORKSPACE}"

      # The PKGBUILD's source is git+https with a #commit= pin that defaults
      # to the latest tagged release (so a plain `makepkg` — e.g. a real AUR
      # build — stays reproducible), but it reads _commit from the
      # environment first, so pin it to the exact commit that triggered this
      # workflow instead of the tag.
      - name: Build package
        run: su builder -c "cd '${GITHUB_WORKSPACE}/packaging/arch' && _commit='${{ github.sha }}' makepkg -s --noconfirm"

      - name: Collect package
        run: |
          mkdir -p dist
          cp packaging/arch/*.pkg.tar.zst dist/

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: dist/*.pkg.tar.zst
