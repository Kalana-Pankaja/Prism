name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 0.2.0). Used for manual runs."
        required: false
        default: ""
      create_release:
        description: "Create/update a GitHub release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_QPA_PLATFORM: offscreen
  FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps

jobs:
  source:
    name: Source archives
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      should_release: ${{ steps.meta.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            should_release=true
          else
            raw="${{ inputs.version }}"
            if [[ -z "${raw}" ]]; then
              raw="0.0.0-${GITHUB_SHA::7}"
            fi
            version="${raw#v}"
            tag="v${version}"
            should_release="${{ inputs.create_release }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Create source archives
        shell: bash
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix=Prism-${{ steps.meta.outputs.version }}/ -o "dist/Prism-${{ steps.meta.outputs.version }}-source.tar.gz" HEAD
          git archive --format=zip --prefix=Prism-${{ steps.meta.outputs.version }}/ -o "dist/Prism-${{ steps.meta.outputs.version }}-source.zip" HEAD

      - name: Upload source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-archives
          path: dist/*

  linux:
    name: Linux packages
    runs-on: ubuntu-22.04
    needs: source
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config ruby ruby-dev \
            qt6-base-dev qt6-tools-dev qt6-multimedia-dev qt6-webengine-dev qt6-websockets-dev \
            libgl1-mesa-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev libavfilter-dev \
            libre2-dev libzip-dev libssl-dev liblua5.4-dev
          sudo gem install --no-document fpm

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}" \
            -DPRISM_WITH_NDI=OFF \
            -DPRISM_WITH_WEBRTC=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Stage install tree
        run: |
          cmake --install build --prefix "${GITHUB_WORKSPACE}/pkgroot/usr"
          cmake --install build --prefix "${GITHUB_WORKSPACE}/AppDir/usr"
          mkdir -p "${GITHUB_WORKSPACE}/dist"

      - name: Build AppImage
        shell: bash
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt.AppImage
          chmod +x linuxdeployqt.AppImage
          export VERSION="${{ needs.source.outputs.version }}"
          ./linuxdeployqt.AppImage AppDir/usr/share/applications/org.cutwire.Prism.desktop \
            -appimage \
            -executable=AppDir/usr/bin/Prism
          appimage="$(ls ./*.AppImage | head -n 1)"
          mv "${appimage}" "dist/Prism-${{ needs.source.outputs.version }}-x86_64.AppImage"

      - name: Build .deb / .rpm / .pkg.tar.zst
        shell: bash
        run: |
          version="${{ needs.source.outputs.version }}"
          fpm -s dir -t deb \
            -n prism \
            -v "${version}" \
            --iteration 1 \
            --architecture amd64 \
            --description "CutWire Prism live media tool" \
            --maintainer "CutWire Studios" \
            --url "https://github.com/CutWire-Studios/Prism" \
            -C pkgroot \
            -p "dist/prism-${version}-amd64.deb" \
            usr

          fpm -s dir -t rpm \
            -n prism \
            -v "${version}" \
            --iteration 1 \
            --architecture x86_64 \
            --description "CutWire Prism live media tool" \
            --maintainer "CutWire Studios" \
            --url "https://github.com/CutWire-Studios/Prism" \
            -C pkgroot \
            -p "dist/prism-${version}-x86_64.rpm" \
            usr

          fpm -s dir -t pacman \
            -n prism \
            -v "${version}" \
            --iteration 1 \
            --architecture x86_64 \
            --description "CutWire Prism live media tool" \
            --maintainer "CutWire Studios" \
            --url "https://github.com/CutWire-Studios/Prism" \
            --pacman-compression zstd \
            -C pkgroot \
            -p "dist/prism-${version}-x86_64.pkg.tar.zst" \
            usr

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*

  windows:
    name: Windows setup
    runs-on: windows-2022
    needs: source
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtmultimedia qtwebengine qtwebsockets
          cache: true

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg.exe install re2 ffmpeg libzip openssl --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} `
            -DFETCHCONTENT_BASE_DIR=${{ env.FETCHCONTENT_BASE_DIR }} `
            -DPRISM_WITH_NDI=OFF `
            -DPRISM_WITH_WEBRTC=OFF `
            -DPRISM_WITH_SEGMENTATION=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Stage runtime files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\bin | Out-Null
          Copy-Item build\Release\* dist\bin -Recurse -Force
          & "${{ env.Qt6_DIR }}\bin\windeployqt.exe" --no-translations --release dist\bin\Prism.exe
          Copy-Item vcpkg\installed\x64-windows\bin\*.dll dist\bin -Force
          Compress-Archive -Path dist\bin\* -DestinationPath "dist\Prism-${{ needs.source.outputs.version }}-windows-x64-portable.zip" -Force

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.6
        with:
          path: installer/windows/Prism.iss
          options: >-
            /DMyAppVersion=${{ needs.source.outputs.version }}
            /DMyAppSource=${{ github.workspace }}\dist\bin

      - name: Collect installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item installer\windows\output\*.exe dist\ -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [source, linux, windows]
    if: needs.source.outputs.should_release == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.source.outputs.release_tag }}"
          title="Prism ${{ needs.source.outputs.version }}"
          notes="Automated release build for Prism ${{ needs.source.outputs.version }}."
          gh release view "${tag}" >/dev/null 2>&1 || gh release create "${tag}" --title "${title}" --notes "${notes}"
          gh release upload "${tag}" release-assets/**/* --clobber
