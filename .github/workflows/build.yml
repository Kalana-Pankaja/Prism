name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy

      - name: cppcheck
        run: |
          cppcheck --std=c++20 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --inline-suppr \
            --error-exitcode=1 \
            -I include \
            -I third_party/qrcodegen \
            -D SWITCHX_HAVE_NDI=0 \
            -D SWITCHX_HAVE_WEBRTC=1 \
            -D SWITCHX_HAVE_OBS_WS=1 \
            -D QT_MESSAGELOGCONTEXT \
            --quiet \
            src include tests

  linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-multimedia-dev \
            qt6-webengine-dev \
            qt6-websockets-dev \
            libgl1-mesa-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libre2-dev \
            libzip-dev \
            libssl-dev \
            clang-tidy

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DSWITCHX_WITH_NDI=OFF \
            -DSWITCHX_WITH_WEBRTC=ON

      - name: Build
        run: cmake --build build --parallel

      - name: clang-tidy
        run: |
          run-clang-tidy -p build -quiet tests/ 2>&1 | tee clang-tidy.log
          issues=$(grep -E ' (error|warning): ' clang-tidy.log | grep -v '/build/' || true)
          if [ -n "$issues" ]; then
            echo "clang-tidy reported issues in tests:"
            echo "$issues" | head -50
            exit 1
          fi

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel

      - name: Verify application binary
        run: test -x build/SwitchX
