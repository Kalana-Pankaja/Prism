name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 500M
  FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache lint apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: |
            cppcheck
            clang-tidy
          version: 1.0

      - name: cppcheck
        run: |
          cppcheck --std=c++20 \
            --library=qt \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=returnByReference \
            --inline-suppr \
            --error-exitcode=1 \
            -I include \
            -I third_party/qrcodegen \
            -D PRISM_HAVE_NDI=0 \
            -D PRISM_HAVE_WEBRTC=1 \
            -D PRISM_HAVE_OBS_WS=1 \
            -D QT_MESSAGELOGCONTEXT \
            --quiet \
            src include tests

  linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Cache build apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: |
            build-essential
            cmake
            pkg-config
            ccache
            qt6-base-dev
            qt6-tools-dev
            qt6-multimedia-dev
            qt6-webengine-dev
            qt6-websockets-dev
            libgl1-mesa-dev
            libgstreamer1.0-dev
            libgstreamer-plugins-base1.0-dev
            libavcodec-dev
            libavformat-dev
            libavutil-dev
            libswscale-dev
            libswresample-dev
            libavfilter-dev
            libre2-dev
            libzip-dev
            libssl-dev
            liblua5.4-dev
            clang-tidy
          version: 1.0

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          ccache --zero-stats || true
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}" \
            -DPRISM_WITH_NDI=OFF \
            -DPRISM_WITH_WEBRTC=OFF

      - name: Build
        run: |
          cmake --build build --parallel
          ccache --show-stats

      - name: clang-tidy
        run: |
          run-clang-tidy -p build -quiet tests/ 2>&1 | tee clang-tidy.log
          issues=$(grep -E ' (error|warning): ' clang-tidy.log | grep -v '/build/' || true)
          if [ -n "$issues" ]; then
            echo "clang-tidy reported issues in tests:"
            echo "$issues" | head -50
            exit 1
          fi

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel

      - name: Verify application binary
        run: test -x build/Prism

  macos:
    runs-on: macos-14
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install qt ffmpeg re2 libzip lua openssl ninja

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix lua)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt);$(brew --prefix re2);$(brew --prefix openssl@3)" \
            -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}" \
            -DPRISM_WITH_NDI=OFF \
            -DPRISM_WITH_WEBRTC=OFF \
            -DPRISM_WITH_SEGMENTATION=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel

      - name: Verify application bundle
        run: test -x build/Prism.app/Contents/MacOS/Prism
