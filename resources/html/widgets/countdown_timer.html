<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: transparent;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
  }
  #label { font-size: 18px; color: #607d8b; letter-spacing: 4px; margin-bottom: 8px; }
  #timer {
    font-size: 72px; font-weight: bold;
    color: #ff6f00;
    letter-spacing: 6px;
  }
  #timer.urgent { color: #f44336; }
</style>
</head>
<body>
<div id="label">COUNTDOWN</div>
<div id="timer">10:00</div>
<script>
  let total = 10 * 60;
  const el = document.getElementById('timer');
  function tick() {
    if (total <= 0) { el.textContent = '00:00'; return; }
    const m = Math.floor(total / 60), s = total % 60;
    el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    el.className = total <= 60 ? 'urgent' : '';
    total--;
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
